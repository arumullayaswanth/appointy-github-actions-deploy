name: AppSec

on:
  workflow_call:
    inputs:
      run_dependency_review:
        required: false
        type: string
        default: "false"
      run_dast:
        required: false
        type: string
        default: "false"
      target_url:
        required: false
        type: string
        default: ""

permissions:
  contents: read
  security-events: write

jobs:
  dependency-review:
    if: ${{ inputs.run_dependency_review == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Dependency review
        uses: actions/dependency-review-action@v4

  npm-audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - backend
          - frontend
          - admin
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

  zap-baseline:
    if: ${{ inputs.run_dast == 'true' && inputs.target_url != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ inputs.target_url }}
