name: CI-CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag for push/deploy
        required: false
        default: latest
      run_deploy:
        description: Run Kubernetes deploy after Docker push
        required: false
        default: "false"
      demo_minutes:
        description: Minutes to keep temporary demo URLs alive
        required: false
        default: "30"
      run_dast:
        description: Run DAST scan
        required: false
        default: "false"
      target_url:
        description: Target URL for DAST scan
        required: false
        default: ""

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  test:
    needs: lint
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    uses: ./.github/workflows/build.yml

  sonar:
    needs: build
    uses: ./.github/workflows/sonarqube.yml
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  trivy:
    needs: build
    uses: ./.github/workflows/trivy.yml

  trivy-fs:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL

      - name: Upload filesystem scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif

  codeql:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  appsec:
    needs: build
    uses: ./.github/workflows/appsec.yml
    with:
      run_dependency_review: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
      run_dast: ${{ github.event.inputs.run_dast || 'false' }}
      target_url: ${{ github.event.inputs.target_url || '' }}

  snyk:
    needs: build
    uses: ./.github/workflows/snyk-security.yml
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  docker-push:
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    needs:
      - sonar
      - trivy
      - trivy-fs
      - codeql
      - appsec
      - snyk
    uses: ./.github/workflows/docker-push.yml
    with:
      image_tag: ${{ github.event.inputs.image_tag || 'latest' }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  k8s-deploy:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_deploy == 'true') }}
    needs: docker-push
    uses: ./.github/workflows/k8s-deploy.yml
    with:
      image_tag: ${{ github.event.inputs.image_tag || 'latest' }}
      demo_minutes: ${{ github.event.inputs.demo_minutes || '30' }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      CLOUDINARY_NAME: ${{ secrets.CLOUDINARY_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_SECRET_KEY: ${{ secrets.CLOUDINARY_SECRET_KEY }}
      RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
      RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
