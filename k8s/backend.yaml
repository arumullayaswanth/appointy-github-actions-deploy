apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: appointy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: docker.io/${DOCKERHUB_USERNAME}/appointy-backend:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: appointy-backend-config
                  key: PORT
            - name: CURRENCY
              valueFrom:
                configMapKeyRef:
                  name: appointy-backend-config
                  key: CURRENCY
            - name: MONGODB_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: appointy-backend-config
                  key: MONGODB_DB_NAME
            - name: MONGODB_URI
              valueFrom:
                configMapKeyRef:
                  name: appointy-backend-config
                  key: MONGODB_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: appointy-backend-secrets
                  key: JWT_SECRET
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: appointy-backend-secrets
                  key: ADMIN_EMAIL
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: appointy-backend-secrets
                  key: ADMIN_PASSWORD
            - name: CLOUDINARY_NAME
              valueFrom:
                secretKeyRef:
                  name: appointy-backend-secrets
                  key: CLOUDINARY_NAME
            - name: CLOUDINARY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: appointy-backend-secrets
                  key: CLOUDINARY_API_KEY
            - name: CLOUDINARY_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: appointy-backend-secrets
                  key: CLOUDINARY_SECRET_KEY
            - name: RAZORPAY_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: appointy-backend-secrets
                  key: RAZORPAY_KEY_ID
            - name: RAZORPAY_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: appointy-backend-secrets
                  key: RAZORPAY_KEY_SECRET
          readinessProbe:
            httpGet:
              path: /readyz
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: appointy
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 4000
      targetPort: 4000
  type: ClusterIP
